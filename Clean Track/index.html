<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a5c3a">
<title>CleanTrack</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#0D1117;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{text-align:center;padding:2rem;}
.logo{font-size:64px;margin-bottom:1rem;}
h1{font-size:32px;font-weight:700;margin-bottom:8px;color:#fff;}
p{font-size:15px;color:#8B949E;margin-bottom:2rem;}
.detecting{display:flex;align-items:center;justify-content:center;gap:10px;font-size:14px;color:#8B949E;margin-bottom:2rem;}
.dot{width:8px;height:8px;border-radius:50%;background:#238636;animation:pulse 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}
.bar{width:220px;height:4px;background:#21262D;border-radius:20px;margin:0 auto 2rem;overflow:hidden;}
.bar-fill{height:100%;background:#238636;border-radius:20px;width:0%;transition:width 4s linear;}
.btns{display:none;flex-direction:column;gap:12px;align-items:center;}
.btn{padding:14px 40px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;border:none;display:flex;align-items:center;gap:10px;width:220px;justify-content:center;transition:opacity .2s;}
.btn:active{opacity:.8;}
.btn-mobile{background:#238636;color:#fff;}
.btn-desktop{background:#161B22;color:#fff;border:1px solid #30363D;}
.btn-desktop:hover{background:#21262D;}
.hint{font-size:12px;color:#6B7280;margin-top:1.5rem;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">🏭</div>
  <h1>CleanTrack</h1>
  <p>Rilevamento dispositivo in corso...</p>
  <div class="detecting">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <span id="status">Analisi in corso</span>
  </div>
  <div class="bar"><div class="bar-fill" id="bar"></div></div>
  <div class="btns" id="btns">
    <p style="font-size:14px;color:#8B949E;margin-bottom:8px;">Scegli la versione</p>
    <button class="btn btn-mobile" onclick="goTo('mobile.html')">📱 Versione Mobile</button>
    <button class="btn btn-desktop" onclick="goTo('desktop.html')">🖥️ Versione Desktop</button>
  </div>
  <div class="hint" id="hint">Verrai reindirizzato automaticamente</div>
</div>

<script>
function goTo(url){window.location.href=url;}

function detect(){
  const ua=navigator.userAgent.toLowerCase();
  const isMobile=/android|iphone|ipad|ipod|blackberry|windows phone|mobile/i.test(ua);
  const isTablet=/ipad|tablet/i.test(ua);
  const w=window.innerWidth;
  const touchPoints=navigator.maxTouchPoints||0;

  // Desktop: schermo largo + no touch primario
  if(!isMobile&&!isTablet&&w>=1024&&touchPoints<2) return 'desktop';
  // Mobile chiaro
  if(isMobile&&!isTablet) return 'mobile';
  // Tablet o ambiguo
  if(w>=768&&!isMobile) return 'desktop';
  return null;
}

// Avvia barra
setTimeout(()=>{document.getElementById('bar').style.width='100%';},100);

// Dopo 1.5s prova a rilevare e reindirizza
setTimeout(()=>{
  const device=detect();
  if(device==='desktop'){
    document.getElementById('status').textContent='Desktop rilevato — reindirizzo...';
    setTimeout(()=>goTo('desktop.html'),800);
  }else if(device==='mobile'){
    document.getElementById('status').textContent='Mobile rilevato — reindirizzo...';
    setTimeout(()=>goTo('mobile.html'),800);
  }
},1500);

// Dopo 4s se non ha reindirizzato mostra selezione manuale
setTimeout(()=>{
  if(window.location.pathname.endsWith('index.html')||window.location.pathname==='/'){
    document.getElementById('status').textContent='Non riesco a rilevare il dispositivo';
    document.getElementById('btns').style.display='flex';
    document.getElementById('hint').style.display='none';
  }
},4000);
</script>
</body>
</html>
